<div class="item-list">
    @for (item of items(); track $index){
        <app-single-item [item]="item" [selectedItem]="selectedItem" [sections]="sections"></app-single-item>
    }
    @empty{
        <div class="noItemInfo">
            No items
        </div>
        <!-- <app-shimmering-list></app-shimmering-list> -->
    }
</div>
